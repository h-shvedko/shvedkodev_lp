name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build production assets
        run: npx gulp dist

      - name: Deploy via SFTP
        run: |
          sudo apt-get install -y lftp
          lftp -u "${{ secrets.SFTP_USERNAME }},${{ secrets.SFTP_PASSWORD }}" \
            sftp://${{ secrets.SFTP_SERVER }} \
            -e "set sftp:auto-confirm yes; mirror --reverse --delete --exclude logs --exclude artist --verbose ./dist/ ${{ secrets.SFTP_REMOTE_DIR }}; quit" || true
