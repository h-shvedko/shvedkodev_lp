  <rect x="30" y="30" width="1140" height="740" fill="none" stroke="#4f46e5" stroke-width="4" stroke-dasharray="16,8" rx="16"/>
  <g font-family="system-ui, -apple-system, sans-serif" text-anchor="middle">
